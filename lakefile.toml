# Lean 4 port of the MM-Lean bridge (see MIGRATION.md).
#
# Phases 1–2a (wire protocol + reflection) are pure Lean-core.  Phase 3 — the
# translation rule engine — adds mathlib4 + Qq: the rules target mathlib
# definitions (HAdd.hAdd, LT.lt, …) and Qq gives type-safe `Expr` quotations.
name = "mathematica"
version = "0.1.0"
defaultTargets = ["Mathematica"]

[leanOptions]
autoImplicit = false          # match the house style of the sibling Lean 4 projects

# mathlib pulls in Qq, Batteries, Aesop, etc. transitively; rev matches lean-toolchain.
[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "Mathematica"

# Reverse bridge (P0 spike): a headless Lean verification service — see
# docs/REVERSE_BRIDGE_DESIGN.md.  Reads wire-form claims on stdin, verifies them
# in the kernel, prints verdicts.
[[lean_lib]]
name = "Reverse"

[[lean_exe]]
name = "lean_verify"
root = "Reverse.LeanVerify"
